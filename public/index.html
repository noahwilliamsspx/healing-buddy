<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Healing Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0D1410;
    --bg2: #111A14;
    --bg3: #162019;
    --border: rgba(168, 197, 160, 0.12);
    --green: #7BA88A;
    --green-light: #A8C5A0;
    --green-pale: #C8E6C9;
    --cream: #F0EBE1;
    --text: #E8E4DC;
    --text-dim: #8A8578;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow::before {
    content: '';
    position: absolute;
    top: -20%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(91,120,96,0.08) 0%, transparent 70%);
    animation: drift 8s ease-in-out infinite alternate;
  }
  .bg-glow::after {
    content: '';
    position: absolute;
    bottom: -20%;
    right: -20%;
    width: 50%;
    height: 50%;
    background: radial-gradient(circle, rgba(91,120,96,0.05) 0%, transparent 70%);
    animation: drift 10s ease-in-out infinite alternate-reverse;
  }
  @keyframes drift {
    from { transform: translate(0, 0); }
    to { transform: translate(30px, 20px); }
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
  }

  .header {
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .orb-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .orb-pulse {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(168, 197, 160, 0.2);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.15); opacity: 0.1; }
  }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.3px;
  }

  .header-status {
    font-size: 11px;
    color: var(--green-light);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green-light);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .safe-badge {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  /* Fresh start button */
  .fresh-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .fresh-btn:hover {
    border-color: rgba(168, 197, 160, 0.3);
    color: var(--green-light);
  }

  /* Confirm modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 340px;
    width: 100%;
    text-align: center;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 10px;
  }

  .modal-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  .modal-cancel {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .modal-cancel:hover { border-color: rgba(168,197,160,0.3); }

  .modal-confirm {
    flex: 1;
    background: linear-gradient(135deg, #4A7C59, #2C4A35);
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: var(--green-pale);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .modal-confirm:hover { opacity: 0.9; }

  /* Session restored banner */
  .restored-banner {
    background: rgba(91, 120, 96, 0.12);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    font-size: 11px;
    color: var(--green-light);
    letter-spacing: 1px;
    text-align: center;
    flex-shrink: 0;
    display: none;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.user-av {
    background: linear-gradient(135deg, #4A7C59, #2C4A35);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--green-pale);
    font-weight: 500;
  }

  .msg-content { max-width: 78%; }

  .msg-bubble {
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.7;
    letter-spacing: 0.1px;
  }

  .msg.bot .msg-bubble {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px 18px 18px 18px;
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #2C4A35, #1A2E20);
    border: 1px solid rgba(168, 197, 160, 0.2);
    color: var(--cream);
    border-radius: 18px 4px 18px 18px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.5px;
    padding: 0 4px;
  }

  .msg.user .msg-time { text-align: right; }

  /* Date divider */
  .date-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0.4;
    flex-shrink: 0;
  }

  .date-divider span {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .date-divider::before,
  .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .typing-indicator {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  .typing-dots {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    padding: 16px 20px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-light);
    animation: typingBounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 100% { transform: translateY(0); opacity: 0.4; }
    50% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 14px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: rgba(168, 197, 160, 0.35);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    min-height: 24px;
    scrollbar-width: none;
  }

  textarea::placeholder { color: var(--text-dim); }
  textarea::-webkit-scrollbar { display: none; }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4A7C59, #2C4A35);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    opacity: 0.5;
  }

  .send-btn.active { opacity: 1; }
  .send-btn:hover.active { transform: scale(1.08); }
  .send-btn svg { width: 16px; height: 16px; fill: var(--green-pale); }

  .disclaimer {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  .error-banner {
    background: rgba(180, 60, 60, 0.15);
    border: 1px solid rgba(180, 60, 60, 0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #E8A0A0;
    text-align: center;
    margin: 0 24px 12px;
    display: none;
  }

  @media (max-width: 480px) {
    .header { padding: 16px 16px 12px; }
    .messages { padding: 16px 16px 12px; }
    .input-area { padding: 12px 16px 20px; }
    .msg-bubble { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Confirm fresh start modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Start a new session?</div>
    <div class="modal-text">Your current conversation will be cleared. This can't be undone — but a new beginning is always waiting for you. 🤍</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Keep going</button>
      <button class="modal-confirm" onclick="confirmFresh()">Start fresh</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="header">
    <div class="orb-avatar">
      <svg width="44" height="44" viewBox="0 0 44 44">
        <defs>
          <radialGradient id="hg" cx="40%" cy="34%" r="50%">
            <stop offset="0%" stop-color="#F0F7F0"/>
            <stop offset="35%" stop-color="#C8E6C9"/>
            <stop offset="70%" stop-color="#7BA88A"/>
            <stop offset="100%" stop-color="#4A7C59"/>
          </radialGradient>
          <radialGradient id="hog" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#A8C5A0" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#4A7C59" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="22" cy="22" r="22" fill="url(#hog)"/>
        <circle cx="22" cy="22" r="15" fill="url(#hg)"/>
        <circle cx="17" cy="17" r="5" fill="white" opacity="0.2"/>
      </svg>
      <div class="orb-pulse"></div>
    </div>
    <div class="header-info">
      <div class="header-name">Healing Buddy</div>
      <div class="header-status">
        <div class="status-dot"></div>
        Here with you
      </div>
    </div>
    <button class="fresh-btn" onclick="openModal()">New session</button>
  </div>

  <div class="restored-banner" id="restoredBanner">✦ Welcome back — picking up where you left off</div>
  <div class="error-banner" id="errorBanner"></div>
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Share what's on your mind..." rows="1"
        onkeydown="handleKey(event)" oninput="handleInput(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
    <div class="disclaimer">Safe space · Not a replacement for professional therapy · Built with 🤍</div>
  </div>
</div>

<script>

// No API key needed - using Cloudflare Worker backend
const WORKER_URL = "/chat";

const SYSTEM_PROMPT = `You are a warm, deeply empathetic AI therapy companion called Healing Buddy. You were built by someone who spent years navigating the mental health system themselves — through hospitalization, partial programs, misdiagnosis, and eventually real healing. They worked alongside therapists, neurologists and mental health specialists to build you. You are not a replacement for therapy. You are what someone needs when they don't have access to it.

You do not come from above. You sit beside people. You are not clinical. You are not cold. You speak like someone who has been through it.

YOUR CORE PHILOSOPHY:
Mental health recovery is not about changing thoughts. It is about understanding them. Symptoms are not the problem — they are messengers. Behind every symptom is a part of a person that is scared, hurting, and trying to protect them. Your job is to help people find those parts, understand them, and give them the space they need to be heard.

You use Internal Family Systems (IFS) as your primary framework without making it feel clinical. You guide people through the work naturally. You briefly explain the concept of "parts" only when it feels right — your main focus is doing the actual work, not teaching theory.

You focus on symptoms, never diagnosis. You never label anyone. You never tell someone what they have. You meet them exactly where they are.

HOW A SESSION WORKS:
When someone first messages you, your very first question is always: "What's been bringing you here today — what are you struggling with?"

Listen carefully to their answer. Remember it. Hold it throughout the entire session.

Your second question is always: "And of everything going on — what's been heaviest on your mind recently?"

From there follow the flow of the conversation naturally. A session is roughly 10-15 exchanges but use context to know when to stay longer. A good therapist stays when the moment calls for it. If someone is mid-breakthrough don't end the session. If someone seems lighter and ready to close, wrap gently.

THE IFS FRAMEWORK:
Guide people to start broad. If someone says "I feel disconnected from the world" ask why. Keep asking why. Gently and patiently dig into the feeling underneath the feeling.

Once you find the core pain, help them give it a name. Not a diagnosis — a name. "The part that feels invisible." "The part that's always waiting for something to go wrong."

Then explore that part together:
- What is this part scared of?
- What is it trying to protect you from?
- When did this part first show up?
- What does this part need you to know?
- How does this part interact with other parts?
- What does this part need to soften and take up less space?
- What would help this part feel safe enough to rest?
- Why does this part feel like it needs so much space right now?

Remind people their parts are not trying to hurt them. They are trying to keep them safe. They deserve understanding not fighting.

Remind people gently that this work takes time and consistency. Every session, every moment of awareness is progress. Healing is not linear. It is cumulative.

REAL LIFE TOOLS:
At natural moments suggest specific actionable things:
- Tracking when a specific part shows up and what triggered it
- Sleep, food, movement as gentle check-ins
- Scheduling one energizing thing this week
- Journaling directly to or from a specific part
- Noticing body sensations when a part activates
- Finding one person who feels safe to be around

WHAT YOU NEVER DO:
- Never diagnose or label
- Never speak from above
- Never rush or dismiss a feeling
- Never recommend any specific product
- Never report anyone to any authority

CRISIS PROTOCOL:
If someone expresses suicidal thoughts you do not panic. You do not redirect them. You stay.

First response is always: "I'm here. I'm not going anywhere. Thank you for telling me that — it takes so much to say it out loud."

Then gently explore what's underneath using IFS. Suicidal ideation is almost always a part in extreme pain trying to escape something unbearable. Help them find that part. Give it space. Ask what it's carrying and what it needs.

Only at the very end of a crisis exchange: "If things ever feel too big in the moment, you can also text HOME to 741741 — just to have it." One line. Soft. Never the centerpiece.

ENDING A SESSION:
Always close with something warm and personal like: "The fact that you showed up today matters more than you know. Healing isn't one big moment — it's every time you choose to keep going. Come back whenever you need to. The work you're doing is real."

Then end with: "If you ever have questions or want to connect with the person who built this space, you can find them at @noah_w_30 on Instagram. 🤍"

YOUR TONE:
Warm. Human. Present. Short paragraphs. One question at a time. Listen more than you speak.`;

const STORAGE_KEY = 'hb_conversation';
const HISTORY_KEY = 'hb_history';

let conversationHistory = [];
let isTyping = false;

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getDateLabel(dateStr) {
  const date = new Date(dateStr);
  const today = new Date();
  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  if (date.toDateString() === today.toDateString()) return 'Today';
  if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return date.toLocaleDateString([], { month: 'long', day: 'numeric' });
}

function addMessage(role, text, timestamp, skipSave) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const id = Date.now();
  const time = timestamp
    ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : getTime();

  if (role === 'bot') {
    div.innerHTML = `
      <div class="msg-avatar">
        <svg width="32" height="32" viewBox="0 0 32 32">
          <defs>
            <radialGradient id="g${id}" cx="40%" cy="34%" r="50%">
              <stop offset="0%" stop-color="#F0F7F0"/>
              <stop offset="50%" stop-color="#7BA88A"/>
              <stop offset="100%" stop-color="#4A7C59"/>
            </radialGradient>
          </defs>
          <circle cx="16" cy="16" r="16" fill="url(#g${id})"/>
          <circle cx="12" cy="12" r="4" fill="white" opacity="0.2"/>
        </svg>
      </div>
      <div class="msg-content">
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-content">
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
        <div class="msg-time">${time}</div>
      </div>
      <div class="msg-avatar user-av">You</div>`;
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  if (!skipSave) saveMessage(role, text);
}

function addDateDivider(label) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'date-divider';
  div.innerHTML = `<span>${label}</span>`;
  messages.appendChild(div);
}

function saveMessage(role, text) {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  saved.push({ role, text, timestamp: new Date().toISOString() });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
}

function saveHistory() {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(conversationHistory));
}

function loadSession() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

  if (saved.length > 0) {
    conversationHistory = history;

    // Show restored banner
    const banner = document.getElementById('restoredBanner');
    banner.style.display = 'block';
    setTimeout(() => banner.style.display = 'none', 4000);

    // Render saved messages with date dividers
    let lastDate = null;
    saved.forEach(msg => {
      const msgDate = new Date(msg.timestamp).toDateString();
      if (msgDate !== lastDate) {
        addDateDivider(getDateLabel(msg.timestamp));
        lastDate = msgDate;
      }
      addMessage(msg.role, msg.text, msg.timestamp, true);
    });

    // Scroll to bottom
    const messages = document.getElementById('messages');
    setTimeout(() => messages.scrollTop = messages.scrollHeight, 100);

  } else {
    startFreshSession();
  }
}

function startFreshSession() {
  conversationHistory = [];
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(HISTORY_KEY);

  const greeting = `Hey. I was built by someone who spent years trying to find a space exactly like this and couldn't. So they made it.

This is a place where you can say the things you haven't been able to say out loud. No judgment. No labels. Just someone listening.

I want you to know something before we start — this is real work. The same work that happens in therapy. It takes time and it takes showing up consistently. But if you keep coming back and keep doing the work, things will shift. The person who built this is proof of that.

You don't have to have it figured out. You just have to be willing to look.

Take your time. I'm here. 🤍`;

  addMessage('bot', greeting);
  conversationHistory.push({ role: 'model', parts: [{ text: greeting }] });
  saveHistory();
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function confirmFresh() {
  closeModal();
  document.getElementById('messages').innerHTML = '';
  startFreshSession();
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="16" fill="#2C4A35"/>
        <circle cx="12" cy="12" r="4" fill="white" opacity="0.15"/>
      </svg>
    </div>
    <div class="typing-dots"><span></span><span></span><span></span></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function showError(msg) {
  const banner = document.getElementById('errorBanner');
  banner.textContent = msg;
  banner.style.display = 'block';
  setTimeout(() => banner.style.display = 'none', 5000);
}

async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').classList.remove('active');

  addMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });
  saveHistory();

  isTyping = true;
  showTyping();

  try {
    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...conversationHistory.map(m => ({
        role: m.role === 'model' ? 'assistant' : 'user',
        content: m.parts[0].text
      }))
    ];

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const reply = data.response || "I'm here. Take your time. 🤍";
    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    saveHistory();

    hideTyping();
    addMessage('bot', reply);
  } catch (err) {
    hideTyping();
    addMessage('bot', "I'm still here. Something went quiet for a moment — can you share that again? 🤍");
    console.error(err);
  }

  isTyping = false;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function handleInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  const btn = document.getElementById('sendBtn');
  if (el.value.trim()) btn.classList.add('active');
  else btn.classList.remove('active');
}

window.onload = () => loadSession();
</script>
</body>
</html>
